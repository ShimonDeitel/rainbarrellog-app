name: RainBarrelLog
options:
  bundleIdPrefix: com.shimondeitel.rainbarrellog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  RainBarrelLog:
    type: application
    platform: iOS
    sources:
      - path: RainBarrelLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.rainbarrellog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: RainBarrelLog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  RainBarrelLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: RainBarrelLogTests
      - path: RainBarrelLog.storekit
    dependencies:
      - target: RainBarrelLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.rainbarrellog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  RainBarrelLogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: RainBarrelLogUITests
    dependencies:
      - target: RainBarrelLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.rainbarrellog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  RainBarrelLog:
    build:
      targets:
        RainBarrelLog: all
        RainBarrelLogTests: [test]
        RainBarrelLogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: RainBarrelLog.storekit
    test:
      config: Debug
      storeKitConfiguration: RainBarrelLog.storekit
      targets:
        - RainBarrelLogTests
        - RainBarrelLogUITests
    archive:
      config: Release
